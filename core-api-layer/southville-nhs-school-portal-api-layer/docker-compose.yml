version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: southville-api
    ports:
      - "3004:3004"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3004/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - southville-network

networks:
  southville-network:
    driver: bridge

